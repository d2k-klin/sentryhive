# Reusable workflow: run a SentryHive scan in CI and upload the report.
#
# Caller example:
#
#   jobs:
#     security:
#       uses: d2k-klin/sentryhive/.github/workflows/scan-example.yml@main
#       permissions:
#         id-token: write   # for OIDC role assumption
#         contents: read
#         pull-requests: write
#       with:
#         role-arn: arn:aws:iam::111122223333:role/SentryHiveAudit
#         regions: eu-central-1,us-east-1
#         fail-on: high
name: SentryHive Scan

on:
  workflow_call:
    inputs:
      role-arn:
        required: true
        type: string
      regions:
        required: false
        type: string
        default: us-east-1
      scanners:
        required: false
        type: string
        default: prowler,cloudsplaining
      fail-on:
        required: false
        type: string
        default: ""

permissions:
  id-token: write
  contents: read
  pull-requests: write

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ inputs.role-arn }}
          aws-region: ${{ fromJSON(format('["{0}"]', inputs.regions))[0] }}

      - name: Run SentryHive
        run: |
          docker run --rm \
            -e AWS_ACCESS_KEY_ID -e AWS_SECRET_ACCESS_KEY -e AWS_SESSION_TOKEN -e AWS_DEFAULT_REGION \
            -v "${{ github.workspace }}/reports:/app/reports" \
            ghcr.io/d2k-klin/sentryhive:latest \
            scan --yes \
              --scanners "${{ inputs.scanners }}" \
              --regions "${{ inputs.regions }}" \
              --out /app/reports \
              ${{ inputs.fail-on != '' && format('--fail-on {0}', inputs.fail-on) || '' }}

      - name: Upload report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: sentryhive-report
          path: reports/

      - name: Comment on PR
        if: always() && github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const path = 'reports/report.md';
            if (!fs.existsSync(path)) return;
            let body = fs.readFileSync(path, 'utf8');
            if (body.length > 60000) body = body.slice(0, 60000) + '\n\n_…truncated; see the uploaded artifact._';
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body,
            });
