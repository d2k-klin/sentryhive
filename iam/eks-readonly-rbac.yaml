# SentryHive read-only in-cluster RBAC (per cluster).
#
# Apply with: kubectl apply -f iam/eks-readonly-rbac.yaml
#
# Grants the `sentryhive-readonly` Kubernetes group (bound to the SentryHive audit
# principal via an EKS access entry or aws-auth mapping) read-only get/list/watch
# access to the resources hardeneks inspects. No write/exec/secret-read.
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: sentryhive-readonly
rules:
  - apiGroups: [""]
    resources:
      - namespaces
      - pods
      - services
      - serviceaccounts
      - configmaps
      - nodes
      - resourcequotas
      - limitranges
      - persistentvolumes
      - persistentvolumeclaims
    verbs: ["get", "list", "watch"]
  - apiGroups: ["apps"]
    resources: ["deployments", "daemonsets", "statefulsets", "replicasets"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["rbac.authorization.k8s.io"]
    resources: ["roles", "rolebindings", "clusterroles", "clusterrolebindings"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["networking.k8s.io"]
    resources: ["networkpolicies", "ingresses"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["policy"]
    resources: ["poddisruptionbudgets"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["autoscaling"]
    resources: ["horizontalpodautoscalers"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: sentryhive-readonly
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: sentryhive-readonly
subjects:
  - apiGroup: rbac.authorization.k8s.io
    kind: Group
    name: sentryhive-readonly
